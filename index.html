<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>평단 수익률 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --border2: #2a2a3e;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --profit: #00e5a0;
    --loss: #ff4d6d;
    --accent: #6c63ff;
    --accent2: #00d4ff;
    --warn: #ffb84d;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 24px 16px 60px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content:''; position:fixed; top:-200px; left:-200px;
    width:600px; height:600px;
    background:radial-gradient(circle,rgba(108,99,255,.07) 0%,transparent 70%);
    pointer-events:none;
  }
  body::after {
    content:''; position:fixed; bottom:-200px; right:-200px;
    width:500px; height:500px;
    background:radial-gradient(circle,rgba(0,212,255,.05) 0%,transparent 70%);
    pointer-events:none;
  }

  .container { max-width:820px; margin:0 auto; }

  /* ── Header ── */
  header { margin-bottom:28px; }
  .header-label {
    font-family:var(--mono); font-size:10px; letter-spacing:3px;
    color:var(--accent); text-transform:uppercase; margin-bottom:8px; opacity:.8;
  }
  h1 { font-size:clamp(24px,5vw,40px); font-weight:800; letter-spacing:-1px; line-height:1.1; color:#fff; }
  h1 span {
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .subtitle { font-family:var(--mono); font-size:11px; color:var(--muted); margin-top:8px; }

  /* ── Summary ── */
  .summary { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:22px; }
  .summary-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
  .s-label { font-family:var(--mono); font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
  .s-val { font-family:var(--mono); font-size:clamp(12px,2.5vw,16px); font-weight:600; color:#fff; word-break:break-all; }
  .summary-card.profit .s-val { color:var(--profit); }
  .summary-card.loss   .s-val { color:var(--loss); }
  .summary-card.neutral .s-val { color:var(--warn); }

  /* ── Tabs ── */
  .tabs { display:flex; gap:4px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:4px; margin-bottom:16px; }
  .tab-btn {
    flex:1; background:none; border:none; border-radius:9px; color:var(--muted);
    cursor:pointer; font-family:var(--mono); font-size:11px; letter-spacing:1px;
    padding:8px; transition:background .2s,color .2s; text-transform:uppercase;
  }
  .tab-btn.active { background:var(--accent); color:#fff; }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  /* ── Add Form ── */
  .form-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:20px; }
  .form-title { font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:14px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr 1fr 1fr auto; gap:10px; align-items:end; }
  .field { display:flex; flex-direction:column; gap:5px; }
  .field label { font-family:var(--mono); font-size:9px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  .field input {
    background:var(--bg); border:1px solid var(--border2); border-radius:8px;
    color:var(--text); font-family:var(--mono); font-size:13px;
    padding:9px 11px; outline:none; transition:border-color .2s; width:100%;
  }
  .field input:focus { border-color:var(--accent); box-shadow:0 0 0 2px rgba(108,99,255,.12); }
  .btn-add {
    background:var(--accent); border:none; border-radius:8px; color:#fff;
    cursor:pointer; font-family:var(--sans); font-size:14px; font-weight:700;
    padding:9px 18px; transition:background .2s,transform .1s; white-space:nowrap; height:38px;
  }
  .btn-add:hover { background:#7c75ff; transform:translateY(-1px); }
  .fetch-row { margin-top:10px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .btn-fetch {
    background:transparent; border:1px solid var(--border2); border-radius:6px;
    color:var(--accent2); cursor:pointer; font-family:var(--mono); font-size:10px;
    letter-spacing:1px; padding:5px 11px; transition:border-color .2s,background .2s;
  }
  .btn-fetch:hover { border-color:var(--accent2); background:rgba(0,212,255,.06); }
  .fetch-status { font-family:var(--mono); font-size:10px; color:var(--muted); }

  /* ── AI Tab ── */
  .ai-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:20px; }
  .drop-zone {
    border:2px dashed var(--border2); border-radius:10px; padding:28px 20px;
    text-align:center; cursor:pointer; transition:border-color .2s,background .2s; position:relative;
  }
  .drop-zone:hover,.drop-zone.dragover { border-color:var(--accent); background:rgba(108,99,255,.05); }
  .drop-zone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
  .drop-icon { font-size:28px; margin-bottom:8px; opacity:.5; }
  .drop-text { font-family:var(--mono); font-size:11px; color:var(--muted); line-height:1.6; }
  .drop-text strong { color:var(--accent2); }
  .preview-list { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
  .preview-item { position:relative; border-radius:8px; overflow:hidden; border:1px solid var(--border2); }
  .preview-item img { width:80px; height:80px; object-fit:cover; display:block; }
  .preview-item .rm-img {
    position:absolute; top:2px; right:2px; background:rgba(0,0,0,.7);
    border:none; border-radius:4px; color:#fff; cursor:pointer; font-size:11px; padding:1px 5px;
  }
  .ai-loading { display:none; text-align:center; padding:20px; font-family:var(--mono); font-size:11px; color:var(--accent2); }
  .ai-loading.visible { display:block; }
  .spinner {
    display:inline-block; width:16px; height:16px;
    border:2px solid var(--border2); border-top-color:var(--accent2);
    border-radius:50%; animation:spin .8s linear infinite; margin-right:8px; vertical-align:middle;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .ai-result { margin-top:14px; background:var(--bg); border:1px solid var(--border2); border-radius:10px; padding:14px; display:none; }
  .ai-result.visible { display:block; }
  .ai-result-title { font-family:var(--mono); font-size:9px; letter-spacing:2px; color:var(--accent2); margin-bottom:10px; }
  .ai-coin-row { display:flex; align-items:center; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); gap:10px; flex-wrap:wrap; transition:opacity .3s; }
  .ai-coin-row:last-of-type { border-bottom:none; }
  .ai-coin-sym { font-family:var(--mono); font-size:13px; font-weight:600; color:#fff; min-width:55px; }
  .ai-coin-detail { font-family:var(--mono); font-size:10px; color:var(--muted); flex:1; }
  .btn-ai-import { background:none; border:1px solid var(--accent); border-radius:6px; color:var(--accent); cursor:pointer; font-family:var(--mono); font-size:10px; padding:4px 10px; transition:background .2s; }
  .btn-ai-import:hover { background:rgba(108,99,255,.15); }
  .btn-ai-import:disabled { opacity:.4; cursor:default; }
  .btn-ai-import-all { margin-top:12px; background:var(--accent); border:none; border-radius:8px; color:#fff; cursor:pointer; font-family:var(--mono); font-size:11px; font-weight:600; padding:8px 20px; letter-spacing:1px; transition:background .2s; }
  .btn-ai-import-all:hover { background:#7c75ff; }

  /* ── Controls ── */
  .controls { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:10px; }
  .section-title { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
  .currency-toggle { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
  .currency-toggle button { background:none; border:none; color:var(--muted); cursor:pointer; font-family:var(--mono); font-size:11px; padding:6px 14px; transition:background .2s,color .2s; }
  .currency-toggle button.active { background:var(--accent); color:#fff; }
  .btn-outline { background:none; border:1px solid var(--border2); border-radius:8px; color:var(--muted); cursor:pointer; font-family:var(--mono); font-size:10px; letter-spacing:1px; padding:6px 12px; transition:color .2s,border-color .2s,background .2s; }
  .btn-outline.refresh { color:var(--accent2); }
  .btn-outline.refresh:hover { border-color:var(--accent2); background:rgba(0,212,255,.06); }
  .btn-outline.danger:hover { color:var(--loss); border-color:rgba(255,77,109,.4); }

  /* ── Holding Row ── */
  .holdings { display:flex; flex-direction:column; gap:8px; }

  .holding-row {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 14px;
    display:grid;
    grid-template-columns: 38px 110px 1fr 1fr 1fr auto;
    gap:10px;
    align-items:center;
    transition:border-color .2s,transform .15s;
    animation:slideIn .25s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .holding-row:hover { border-color:var(--border2); }
  .holding-row.editing { border-color:var(--accent); box-shadow:0 0 0 2px rgba(108,99,255,.1); }

  .coin-icon {
    width:34px; height:34px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:10px; font-weight:800; color:#fff; letter-spacing:-.5px; flex-shrink:0;
  }

  /* coin name cell */
  .cell-name { display:flex; flex-direction:column; }
  .cell-name .sym { font-family:var(--mono); font-size:14px; font-weight:700; color:#fff; }
  .cell-name .qty-wrap { display:flex; align-items:center; gap:4px; margin-top:2px; }

  /* ── Inline Editable Field ── */
  .editable-field {
    display:flex; flex-direction:column; gap:2px;
  }
  .editable-field .ef-label {
    font-family:var(--mono); font-size:9px; letter-spacing:1.5px;
    color:var(--muted); text-transform:uppercase;
    display:flex; align-items:center; gap:4px;
  }
  .ef-label .edit-icon {
    font-size:9px; opacity:0; cursor:pointer; color:var(--accent2);
    transition:opacity .15s; padding:0 2px;
  }
  .holding-row:hover .ef-label .edit-icon { opacity:.7; }
  .ef-label .edit-icon:hover { opacity:1 !important; }

  /* display mode */
  .ef-display { font-family:var(--mono); font-size:12px; color:var(--text); font-weight:500; cursor:pointer; }
  .ef-display:hover { color:var(--accent2); text-decoration:underline; text-decoration-style:dotted; }
  .ef-sub { font-family:var(--mono); font-size:9px; color:var(--muted); }

  /* edit mode */
  .ef-input-wrap { display:none; align-items:center; gap:4px; }
  .ef-input-wrap.active { display:flex; }
  .ef-input {
    background:var(--bg); border:1px solid var(--accent);
    border-radius:6px; color:var(--text); font-family:var(--mono);
    font-size:12px; padding:4px 8px; outline:none; width:120px;
    box-shadow:0 0 0 2px rgba(108,99,255,.12);
  }
  .ef-confirm {
    background:var(--accent); border:none; border-radius:5px; color:#fff;
    cursor:pointer; font-family:var(--mono); font-size:10px; padding:4px 8px;
    transition:background .15s; white-space:nowrap;
  }
  .ef-confirm:hover { background:#7c75ff; }
  .ef-cancel {
    background:none; border:1px solid var(--border2); border-radius:5px; color:var(--muted);
    cursor:pointer; font-family:var(--mono); font-size:10px; padding:4px 7px;
  }
  .ef-cancel:hover { color:var(--loss); border-color:rgba(255,77,109,.4); }

  /* qty inline */
  .qty-text { font-family:var(--mono); font-size:10px; color:var(--muted); cursor:pointer; }
  .qty-text:hover { color:var(--accent2); text-decoration:underline; text-decoration-style:dotted; }
  .qty-edit-wrap { display:none; align-items:center; gap:3px; }
  .qty-edit-wrap.active { display:flex; }
  .qty-input {
    background:var(--bg); border:1px solid var(--accent); border-radius:5px;
    color:var(--text); font-family:var(--mono); font-size:10px;
    padding:3px 7px; outline:none; width:110px;
  }
  .qty-btn { background:var(--accent); border:none; border-radius:4px; color:#fff; cursor:pointer; font-size:10px; padding:3px 7px; }
  .qty-cancel { background:none; border:1px solid var(--border2); border-radius:4px; color:var(--muted); cursor:pointer; font-size:10px; padding:3px 6px; }

  /* pnl cell */
  .cell-pnl { display:flex; flex-direction:column; gap:3px; }
  .pnl-val { font-family:var(--mono); font-size:12px; font-weight:600; }
  .pnl-val.profit { color:var(--profit); }
  .pnl-val.loss   { color:var(--loss); }
  .pnl-badge { display:inline-block; border-radius:5px; padding:2px 7px; font-family:var(--mono); font-size:11px; font-weight:600; }
  .pnl-badge.profit { background:rgba(0,229,160,.12); color:var(--profit); }
  .pnl-badge.loss   { background:rgba(255,77,109,.12); color:var(--loss); }
  .pnl-badge.zero   { background:rgba(255,184,77,.12); color:var(--warn); }

  .btn-del { background:none; border:1px solid transparent; border-radius:6px; color:var(--muted); cursor:pointer; font-size:15px; line-height:1; padding:5px 7px; transition:color .2s,border-color .2s; }
  .btn-del:hover { color:var(--loss); border-color:rgba(255,77,109,.3); }

  .empty { text-align:center; padding:44px 20px; color:var(--muted); font-family:var(--mono); font-size:12px; letter-spacing:1px; border:1px dashed var(--border); border-radius:14px; }
  .empty .icon { font-size:30px; margin-bottom:10px; opacity:.4; }

  /* changed flash */
  @keyframes flashGreen { 0%{background:rgba(0,229,160,.15)} 100%{background:transparent} }
  .flash { animation:flashGreen .6s ease; }

  @media(max-width:680px){
    .holding-row { grid-template-columns:34px 1fr 1fr; gap:8px; }
    .form-grid { grid-template-columns:1fr 1fr; }
    .btn-add { grid-column:span 2; }
    .summary { grid-template-columns:1fr 1fr; }
    .summary-card:last-child { grid-column:span 2; }
    .ef-input { width:90px; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-label">// Portfolio Tracker</div>
    <h1>거래소 <span>평단</span> 수익률 계산기</h1>
    <div class="subtitle">평단가·수량 직접 수정 가능 &nbsp;·&nbsp; 스테이킹/개인지갑 통합 손익 추적</div>
  </header>

  <div class="summary">
    <div class="summary-card">
      <div class="s-label">총 매수금액</div>
      <div class="s-val" id="sum-cost">계산 중...</div>
    </div>
    <div class="summary-card">
      <div class="s-label">현재 평가금액</div>
      <div class="s-val" id="sum-cur">조회 중...</div>
    </div>
    <div class="summary-card neutral" id="sum-pnl-card">
      <div class="s-label">총 손익</div>
      <div class="s-val" id="sum-pnl">-</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('manual')">✏️ 수동 입력</button>
    <button class="tab-btn" onclick="switchTab('ai')">🤖 AI 이미지 인식</button>
  </div>

  <!-- Manual Tab -->
  <div class="tab-panel active" id="tab-manual">
    <div class="form-card">
      <div class="form-title">// 코인 추가</div>
      <div class="form-grid">
        <div class="field">
          <label>심볼</label>
          <input id="inp-symbol" type="text" placeholder="BTC" maxlength="10" onkeydown="if(event.key==='Enter')addCoin()" />
        </div>
        <div class="field">
          <label>수량</label>
          <input id="inp-qty" type="number" placeholder="0.0" step="any" min="0" onkeydown="if(event.key==='Enter')addCoin()" />
        </div>
        <div class="field">
          <label>평단가 <span id="unit-label" style="color:var(--accent2)">KRW</span></label>
          <input id="inp-avg" type="number" placeholder="0" step="any" min="0" onkeydown="if(event.key==='Enter')addCoin()" />
        </div>
        <div class="field">
          <label>현재가 <span id="unit-label2" style="color:var(--accent2)">KRW</span></label>
          <input id="inp-cur" type="number" placeholder="자동조회" step="any" min="0" onkeydown="if(event.key==='Enter')addCoin()" />
        </div>
        <button class="btn-add" onclick="addCoin()">추가 +</button>
      </div>
      <div class="fetch-row">
        <button class="btn-fetch" onclick="fetchPrice()">⟳ 업비트 현재가</button>
        <span class="fetch-status" id="fetch-status"></span>
      </div>
    </div>
  </div>

  <!-- AI Tab -->
  <div class="tab-panel" id="tab-ai">
    <div class="ai-card">
      <div class="form-title">// AI 이미지 인식 자동 등록</div>
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="img-input" accept="image/*" multiple onchange="handleFiles(this.files)" />
        <div class="drop-icon">📸</div>
        <div class="drop-text">
          거래소 스크린샷을 끌어다 놓거나 클릭해서 선택<br>
          <strong>업비트 투자내역 · 스테이킹 화면 모두 인식</strong>
        </div>
      </div>
      <div class="preview-list" id="preview-list"></div>
      <div class="ai-loading" id="ai-loading"><span class="spinner"></span>AI가 이미지를 분석하는 중...</div>
      <div class="ai-result" id="ai-result">
        <div class="ai-result-title">// 인식 결과 — 등록할 항목을 선택하세요</div>
        <div id="ai-coin-list"></div>
        <button class="btn-ai-import-all" onclick="importAll()">✓ 전체 등록</button>
      </div>
    </div>
  </div>

  <!-- Holdings -->
  <div class="controls">
    <div class="section-title">// 보유 코인</div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <div class="currency-toggle">
        <button class="active" id="btn-krw" onclick="setCurrency('KRW')">KRW</button>
        <button id="btn-usd" onclick="setCurrency('USD')">USD</button>
      </div>
      <button class="btn-outline refresh" onclick="refreshAllPrices()">⟳ 현재가 갱신</button>
      <button class="btn-outline danger" onclick="clearAll()">전체 삭제</button>
    </div>
  </div>

  <div class="holdings" id="holdings"></div>
  <div class="empty" id="empty-state" style="display:none">
    <div class="icon">📂</div>
    코인을 추가해 수익률을 계산해보세요
  </div>

</div>
<script>
// ── 초기 데이터 ──────────────────────────────────────────────
const PRESET = [
  { symbol:'ETH',   qty:11.00000000,    avg:3984052   },
  { symbol:'BTC',   qty:0.30500000,     avg:119376566 },
  { symbol:'XRP',   qty:5700.53022181,  avg:3364.9    },
  { symbol:'SOL',   qty:203.24496936,   avg:252277    },
  { symbol:'SUI',   qty:3889.18060377,  avg:5383.3    },
  { symbol:'TRUMP', qty:1101.00000000,  avg:11373     },
  { symbol:'ETC',   qty:371.72573776,   avg:32119     },
  { symbol:'AVAX',  qty:258.00000000,   avg:56222     },
  { symbol:'STX',   qty:10363.47171072, avg:1397.8    },
  { symbol:'DOGE',  qty:24449.02195588, avg:388.1     },
  { symbol:'ADA',   qty:10447.85220780, avg:1160      },
];

const STORE_KEY = 'coins_v4';
let coins = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
if (!coins) {
  coins = PRESET.map((c, i) => ({ id: Date.now() + i, cur: 0, ...c }));
  save();
}

let currency = localStorage.getItem('currency') || 'KRW';
let usdRate = 1350;
let aiParsed = [];
let uploadedImages = [];

// ── Helpers ──────────────────────────────────────────────────
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(coins)); }

function fmt(n, c) {
  if (c === 'USD') return '$' + (n / usdRate).toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
  if (Math.abs(n) < 10) return '₩' + n.toFixed(2);
  return '₩' + Math.round(n).toLocaleString('ko-KR');
}

function fmtQty(n) {
  return n.toLocaleString('ko-KR', { maximumFractionDigits: 8 });
}

function coinColor(s) {
  const map = {
    BTC:'linear-gradient(135deg,#f7931a,#e8650a)', ETH:'linear-gradient(135deg,#627eea,#4a5fc5)',
    XRP:'linear-gradient(135deg,#00aab5,#007d85)', SOL:'linear-gradient(135deg,#9945ff,#7b34d3)',
    ADA:'linear-gradient(135deg,#0033ad,#0055d4)', DOGE:'linear-gradient(135deg,#c2a633,#a08820)',
    AVAX:'linear-gradient(135deg,#e84142,#b52f30)', SUI:'linear-gradient(135deg,#6fbcf0,#4a9fd4)',
    STX:'linear-gradient(135deg,#5546ff,#3a2ecc)', ETC:'linear-gradient(135deg,#328432,#236023)',
    TRUMP:'linear-gradient(135deg,#c8102e,#8b0000)',
  };
  return map[s] || 'linear-gradient(135deg,#6c63ff,#4a43cc)';
}

// ── Tab ──────────────────────────────────────────────────────
function switchTab(t) {
  document.querySelectorAll('.tab-btn').forEach((b, i) =>
    b.classList.toggle('active', ['manual','ai'][i] === t));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
}

// ── Currency ─────────────────────────────────────────────────
function setCurrency(c) {
  currency = c;
  localStorage.setItem('currency', c);
  document.getElementById('btn-krw').classList.toggle('active', c === 'KRW');
  document.getElementById('btn-usd').classList.toggle('active', c === 'USD');
  document.getElementById('unit-label').textContent  = c;
  document.getElementById('unit-label2').textContent = c;
  render();
}

async function fetchUSDRate() {
  try {
    const r = await fetch('https://api.frankfurter.app/latest?from=USD&to=KRW');
    const d = await r.json();
    if (d.rates?.KRW) usdRate = d.rates.KRW;
  } catch {}
}

// ── Add Coin ─────────────────────────────────────────────────
function addCoin() {
  const symbol = document.getElementById('inp-symbol').value.trim().toUpperCase();
  const qty    = parseFloat(document.getElementById('inp-qty').value);
  const avg    = parseFloat(document.getElementById('inp-avg').value);
  const cur    = parseFloat(document.getElementById('inp-cur').value) || 0;
  if (!symbol || isNaN(qty) || qty <= 0 || isNaN(avg) || avg <= 0) {
    shake(document.querySelector('.form-card')); return;
  }
  coins.push({ id: Date.now(), symbol, qty, avg, cur });
  save(); render();
  ['inp-symbol','inp-qty','inp-avg','inp-cur'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('inp-symbol').focus();
}

function deleteCoin(id) { coins = coins.filter(c => c.id !== id); save(); render(); }

function clearAll() {
  if (!coins.length) return;
  if (confirm('전체 삭제하시겠습니까?')) { coins = []; save(); render(); }
}

// ── Inline Edit: AVG ─────────────────────────────────────────
function startEditAvg(id) {
  const coin = coins.find(c => c.id === id);
  if (!coin) return;
  const row = document.getElementById(`row-${id}`);
  row.classList.add('editing');
  const disp = document.getElementById(`avg-disp-${id}`);
  const wrap = document.getElementById(`avg-edit-${id}`);
  const inp  = document.getElementById(`avg-inp-${id}`);
  disp.style.display = 'none';
  wrap.classList.add('active');
  inp.value = coin.avg;
  inp.focus(); inp.select();
}

function confirmAvg(id) {
  const coin = coins.find(c => c.id === id);
  if (!coin) return;
  const inp = document.getElementById(`avg-inp-${id}`);
  const val = parseFloat(inp.value);
  if (!isNaN(val) && val > 0) {
    coin.avg = val;
    save();
    flashRow(id);
  }
  cancelAvg(id);
  render();
}

function cancelAvg(id) {
  const row  = document.getElementById(`row-${id}`);
  const disp = document.getElementById(`avg-disp-${id}`);
  const wrap = document.getElementById(`avg-edit-${id}`);
  row?.classList.remove('editing');
  if (disp) disp.style.display = '';
  wrap?.classList.remove('active');
}

// ── Inline Edit: QTY ─────────────────────────────────────────
function startEditQty(id) {
  const coin = coins.find(c => c.id === id);
  if (!coin) return;
  const row = document.getElementById(`row-${id}`);
  row.classList.add('editing');
  const disp = document.getElementById(`qty-disp-${id}`);
  const wrap = document.getElementById(`qty-edit-${id}`);
  const inp  = document.getElementById(`qty-inp-${id}`);
  disp.style.display = 'none';
  wrap.classList.add('active');
  inp.value = coin.qty;
  inp.focus(); inp.select();
}

function confirmQty(id) {
  const coin = coins.find(c => c.id === id);
  if (!coin) return;
  const inp = document.getElementById(`qty-inp-${id}`);
  const val = parseFloat(inp.value);
  if (!isNaN(val) && val > 0) {
    coin.qty = val;
    save();
    flashRow(id);
  }
  cancelQty(id);
  render();
}

function cancelQty(id) {
  const row  = document.getElementById(`row-${id}`);
  const disp = document.getElementById(`qty-disp-${id}`);
  const wrap = document.getElementById(`qty-edit-${id}`);
  row?.classList.remove('editing');
  if (disp) disp.style.display = '';
  wrap?.classList.remove('active');
}

function flashRow(id) {
  const row = document.getElementById(`row-${id}`);
  if (row) { row.classList.remove('flash'); void row.offsetWidth; row.classList.add('flash'); }
}

// ── Upbit Price ───────────────────────────────────────────────
async function fetchPrice() {
  const symbol = document.getElementById('inp-symbol').value.trim().toUpperCase();
  const status = document.getElementById('fetch-status');
  if (!symbol) { status.textContent = '심볼을 먼저 입력하세요'; return; }
  status.textContent = '불러오는 중...';
  try {
    const r = await fetch(`https://api.upbit.com/v1/ticker?markets=KRW-${symbol}`);
    const d = await r.json();
    if (d?.[0]?.trade_price) {
      document.getElementById('inp-cur').value = d[0].trade_price;
      status.textContent = `✓ ${symbol} ${d[0].trade_price.toLocaleString()} KRW`;
    } else status.textContent = '해당 마켓 없음';
  } catch { status.textContent = '불러오기 실패'; }
}

async function refreshCoinPrice(id) {
  const coin = coins.find(c => c.id === id);
  if (!coin) return;
  try {
    const r = await fetch(`https://api.upbit.com/v1/ticker?markets=KRW-${coin.symbol}`);
    const d = await r.json();
    if (d?.[0]?.trade_price) { coin.cur = d[0].trade_price; save(); render(); }
  } catch {}
}

async function refreshAllPrices() {
  const symbols = [...new Set(coins.map(c => c.symbol))];
  if (!symbols.length) return;
  const btn = document.querySelector('.btn-outline.refresh');
  if (btn) btn.textContent = '⟳ 갱신 중...';
  try {
    const markets = symbols.map(s => `KRW-${s}`).join(',');
    const r = await fetch(`https://api.upbit.com/v1/ticker?markets=${markets}`);
    const d = await r.json();
    if (d) {
      d.forEach(item => {
        const sym = item.market.replace('KRW-', '');
        coins.filter(c => c.symbol === sym).forEach(c => c.cur = item.trade_price);
      });
      save(); render();
    }
  } catch {}
  if (btn) btn.textContent = '⟳ 현재가 갱신';
}

// ── AI Image ─────────────────────────────────────────────────
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

async function handleFiles(files) {
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    const dataUrl = await readFile(file);
    const idx = uploadedImages.length;
    uploadedImages.push({ dataUrl, base64: dataUrl.split(',')[1], type: file.type });
    const div = document.createElement('div');
    div.className = 'preview-item'; div.id = `prev-${idx}`;
    div.innerHTML = `<img src="${dataUrl}"><button class="rm-img" onclick="removeImg(${idx})">✕</button>`;
    document.getElementById('preview-list').appendChild(div);
  }
  analyzeImages();
}

function readFile(f) {
  return new Promise(res => { const r = new FileReader(); r.onload = e => res(e.target.result); r.readAsDataURL(f); });
}
function removeImg(idx) { uploadedImages[idx] = null; document.getElementById(`prev-${idx}`)?.remove(); }

async function analyzeImages() {
  const images = uploadedImages.filter(Boolean);
  if (!images.length) return;
  document.getElementById('ai-loading').classList.add('visible');
  document.getElementById('ai-result').classList.remove('visible');
  const content = [
    ...images.map(img => ({ type:'image', source:{ type:'base64', media_type:img.type, data:img.base64 } })),
    { type:'text', text:`업비트 또는 스테이킹 앱 스크린샷에서 코인 정보를 추출해 JSON 배열만 반환하세요. 다른 텍스트 없이 순수 JSON만:
[{"symbol":"BTC","qty":0.305,"avg":119376566,"note":"거래소"}]
- symbol: 코인 심볼 대문자
- qty: 보유 수량 (콤마 제거한 순수 숫자)
- avg: 평균 매수가 KRW (없으면 0)
- note: 거래소/스테이킹/지갑 등 짧은 메모` }
  ];
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, messages:[{role:'user',content}] })
    });
    const data = await resp.json();
    const raw  = data.content?.find(b => b.type==='text')?.text || '[]';
    aiParsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
    renderAIResult();
  } catch (e) {
    document.getElementById('ai-loading').classList.remove('visible');
    alert('AI 분석 실패: ' + e.message);
  }
}

function renderAIResult() {
  document.getElementById('ai-loading').classList.remove('visible');
  document.getElementById('ai-result').classList.add('visible');
  const list = document.getElementById('ai-coin-list');
  list.innerHTML = '';
  aiParsed.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'ai-coin-row'; row.id = `ai-row-${i}`;
    row.innerHTML = `
      <span class="ai-coin-sym">${c.symbol}</span>
      <span class="ai-coin-detail">수량 ${Number(c.qty).toLocaleString('ko-KR',{maximumFractionDigits:8})} · 평단 ${c.avg ? Number(c.avg).toLocaleString('ko-KR')+' KRW' : '미확인'} ${c.note?'· '+c.note:''}</span>
      <button class="btn-ai-import" id="ai-btn-${i}" onclick="importOne(${i})">등록</button>`;
    list.appendChild(row);
  });
}

function importOne(i) {
  const c = aiParsed[i]; if (!c) return;
  coins.push({ id:Date.now()+Math.random(), symbol:c.symbol, qty:Number(c.qty), avg:Number(c.avg)||0, cur:0 });
  save(); render();
  const row = document.getElementById(`ai-row-${i}`);
  const btn = document.getElementById(`ai-btn-${i}`);
  if (row) row.style.opacity = '0.4';
  if (btn) { btn.textContent = '✓ 등록됨'; btn.disabled = true; }
}
function importAll() { aiParsed.forEach((_,i) => importOne(i)); }

// ── Render ───────────────────────────────────────────────────
function render() {
  const list  = document.getElementById('holdings');
  const empty = document.getElementById('empty-state');
  empty.style.display = coins.length === 0 ? 'block' : 'none';
  list.innerHTML = '';

  let totalCost = 0, totalCurVal = 0;
  const sorted = [...coins].sort((a,b) => (b.qty*b.avg)-(a.qty*a.avg));

  sorted.forEach(coin => {
    const cost = coin.qty * coin.avg;
    const curV = coin.qty * coin.cur;
    const pnl  = curV - cost;
    const pct  = cost > 0 ? (pnl / cost * 100) : 0;
    totalCost   += cost;
    totalCurVal += curV;

    const pc   = pnl > 0 ? 'profit' : pnl < 0 ? 'loss' : 'zero';
    const sign = pnl > 0 ? '+' : '';
    const ic   = coinColor(coin.symbol);
    const id   = coin.id;

    const row = document.createElement('div');
    row.className = 'holding-row';
    row.id = `row-${id}`;

    row.innerHTML = `
      <!-- icon -->
      <div class="coin-icon" style="background:${ic}">${coin.symbol.slice(0,3)}</div>

      <!-- name + qty editable -->
      <div class="cell-name">
        <span class="sym">${coin.symbol}</span>
        <div class="qty-wrap">
          <span class="qty-text" id="qty-disp-${id}" onclick="startEditQty(${id})" title="클릭해서 수량 수정">${fmtQty(coin.qty)}개 ✎</span>
          <div class="qty-edit-wrap" id="qty-edit-${id}">
            <input class="qty-input" id="qty-inp-${id}" type="number" step="any" min="0"
              onkeydown="if(event.key==='Enter')confirmQty(${id});if(event.key==='Escape')cancelQty(${id})" />
            <button class="qty-btn" onclick="confirmQty(${id})">✓</button>
            <button class="qty-cancel" onclick="cancelQty(${id})">✕</button>
          </div>
        </div>
      </div>

      <!-- 평단가 editable -->
      <div class="editable-field">
        <div class="ef-label">평단가 <span class="edit-icon" onclick="startEditAvg(${id})" title="평단가 수정">✎</span></div>
        <span class="ef-display" id="avg-disp-${id}" onclick="startEditAvg(${id})" title="클릭해서 평단가 수정">${fmt(coin.avg, currency)}</span>
        <div class="ef-input-wrap" id="avg-edit-${id}">
          <input class="ef-input" id="avg-inp-${id}" type="number" step="any" min="0"
            onkeydown="if(event.key==='Enter')confirmAvg(${id});if(event.key==='Escape')cancelAvg(${id})" />
          <button class="ef-confirm" onclick="confirmAvg(${id})">확인</button>
          <button class="ef-cancel" onclick="cancelAvg(${id})">취소</button>
        </div>
        <span class="ef-sub">매수 ${fmt(cost, currency)}</span>
      </div>

      <!-- 현재가 -->
      <div class="editable-field">
        <div class="ef-label">현재가 <span class="edit-icon" onclick="refreshCoinPrice(${id})" title="업비트 현재가 조회">⟳</span></div>
        <span class="ef-display" style="cursor:default;color:var(--text)">${coin.cur ? fmt(coin.cur, currency) : '<span style="color:var(--muted);font-size:10px">미조회</span>'}</span>
        <span class="ef-sub">${coin.cur ? '평가 '+fmt(curV, currency) : ''}</span>
      </div>

      <!-- 손익 -->
      <div class="cell-pnl">
        ${coin.cur
          ? `<div class="pnl-val ${pc}">${sign}${fmt(pnl, currency)}</div>
             <span class="pnl-badge ${pc}">${sign}${pct.toFixed(2)}%</span>`
          : `<div style="font-family:var(--mono);font-size:10px;color:var(--muted)">현재가<br>조회 필요</div>`}
      </div>

      <button class="btn-del" onclick="deleteCoin(${id})" title="삭제">×</button>
    `;
    list.appendChild(row);
  });

  // Summary
  const totalPnl = totalCurVal - totalCost;
  const totalPct = totalCost > 0 ? (totalPnl / totalCost * 100) : 0;
  const s = totalPnl > 0 ? '+' : '';
  document.getElementById('sum-cost').textContent = fmt(totalCost, currency);
  document.getElementById('sum-cur').textContent  = totalCurVal > 0 ? fmt(totalCurVal, currency) : '조회 필요';
  document.getElementById('sum-pnl').textContent  = totalCurVal > 0
    ? `${s}${fmt(totalPnl, currency)} (${s}${totalPct.toFixed(2)}%)`
    : '현재가 갱신 필요';
  document.getElementById('sum-pnl-card').className =
    'summary-card ' + (totalPnl > 0 ? 'profit' : totalPnl < 0 ? 'loss' : 'neutral');
}

function shake(el) {
  el.style.animation='none'; el.offsetHeight;
  el.style.animation='shakeX .35s ease';
  setTimeout(()=>el.style.animation='',400);
}

const sty = document.createElement('style');
sty.textContent=`@keyframes shakeX{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}`;
document.head.appendChild(sty);

// ── Init ─────────────────────────────────────────────────────
setCurrency(currency);
fetchUSDRate().then(() => render());
render();
refreshAllPrices();
</script>
</body>
</html>
